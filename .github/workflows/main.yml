name: Run Python Script

on:
  push:
    branches: [ "main" ]  # Runs every time you push to the main branch
  workflow_dispatch:      # Allows you to run it manually from the "Actions" tab

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        # If you have a requirements.txt, uncomment the line below
        # pip install -r requirements.txt
        echo "No dependencies to install for this demo."

    - name: Execute Python script
      env:
        USER_NAME: "GitHub Contributor"
      run: python GitHub_Test.py
